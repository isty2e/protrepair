name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install package, dev, and refinement dependencies
        run: .venv/bin/python -m pip install ".[dev,refinement]"

      - name: Ruff
        run: .venv/bin/ruff check src/protrepair tests --extend-select=I,UP

      - name: Basedpyright
        run: .venv/bin/basedpyright src/protrepair tests

      - name: Unit tests
        run: .venv/bin/pytest tests/unit tests/corpus tests/workflow -m "not benchmark" -q

  lean:
    name: Lean optional dependency boundary (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install package and dev dependencies
        run: .venv/bin/python -m pip install ".[dev]"

      - name: Verify RDKit is outside the lean environment
        run: .venv/bin/python -c "import importlib.util; assert importlib.util.find_spec('rdkit') is None"

      - name: Lean optional dependency tests
        run: |
          rdkit_blocker="$(mktemp -d)"
          printf 'raise ModuleNotFoundError("No module named rdkit")\n' > "$rdkit_blocker/rdkit.py"
          PYTHONPATH="$rdkit_blocker:${PYTHONPATH:-}" .venv/bin/pytest \
            tests/unit/test_release_artifacts.py \
            tests/unit/test_parser_repair_performance_support.py \
            tests/workflow/test_process_representatives.py::test_process_structure_preserves_representative_semantics \
            tests/workflow/test_process_representatives.py::test_process_structure_preserves_rdkit_coordinate_digest \
            -q
