name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      PROTREPAIR_RELEASE_STRICT_RDKIT_DIGESTS: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install package, dev, and refinement dependencies
        run: .venv/bin/python -m pip install -c constraints/release.txt ".[dev,refinement]"

      - name: Ruff
        run: .venv/bin/ruff check src/protrepair tests --extend-select=I,UP

      - name: Basedpyright
        run: .venv/bin/basedpyright src/protrepair tests

      - name: Unit tests
        run: .venv/bin/pytest tests/unit tests/corpus tests/workflow -m "not benchmark" -q

  lean:
    name: Lean optional dependency boundary (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install package and dev dependencies
        run: .venv/bin/python -m pip install -c constraints/release.txt ".[dev]"

      - name: Verify RDKit is outside the lean environment
        run: .venv/bin/python -c "import importlib.util; assert importlib.util.find_spec('rdkit') is None"

      - name: Lean optional dependency tests
        run: |
          rdkit_blocker="$(mktemp -d)"
          printf 'raise ModuleNotFoundError("No module named rdkit")\n' > "$rdkit_blocker/rdkit.py"
          PYTHONPATH="$rdkit_blocker:${PYTHONPATH:-}" .venv/bin/pytest \
            tests/unit/test_release_artifacts.py \
            tests/unit/test_release_public_api_contract.py \
            tests/unit/test_readme_usage.py \
            tests/unit/test_retained_non_polymer_no_rdkit_release.py \
            tests/unit/test_parser_repair_performance_support.py \
            tests/workflow/test_process_representatives.py::test_process_structure_preserves_representative_semantics \
            tests/workflow/test_process_representatives.py::test_process_structure_preserves_rdkit_coordinate_digest \
            -q

  installed-wheel-smoke:
    name: Installed wheel FASPR/RDKit smoke (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create release build environment
        run: python -m venv .venv

      - name: Install constrained release build tools
        run: .venv/bin/python -m pip install -c constraints/release.txt hatchling hatch-vcs scikit-build-core

      - name: Run installed-wheel FASPR smoke
        run: .venv/bin/python scripts/run_installed_wheel_smoke.py

      - name: Run installed-wheel RDKit refinement smoke
        run: .venv/bin/python scripts/run_installed_wheel_smoke.py --with-refinement

  artifact-content:
    name: Release artifact content (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create release artifact test environment
        run: python -m venv .venv

      - name: Install constrained release artifact test tools
        run: .venv/bin/python -m pip install -c constraints/release.txt pytest hatchling hatch-vcs scikit-build-core

      - name: Run release artifact content tests
        run: .venv/bin/python -m pytest tests/release/test_artifact_contents.py -q
